name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # publish the GitHub Release
  id-token: write   # cosign keyless signing via GitHub OIDC

jobs:
  verify:
    name: Verify (fmt + lint + vet + build + race test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
      - name: Install golangci-lint v2
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: Check formatting
        run: |
          OUTPUT=$(golangci-lint fmt --diff ./...)
          if [ -n "$OUTPUT" ]; then
            echo "::error::Tagged release must be on a formatted tree."
            echo "$OUTPUT"
            exit 1
          fi
      - name: Lint
        run: golangci-lint run --timeout=3m ./...
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Race test
        run: go test ./... -race -count=1
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: [verify]
    outputs:
      sbom-path: ${{ steps.sbom.outputs.path }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
      - name: Install cyclonedx-gomod
        run: go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest
      - name: Generate CycloneDX SBOM
        id: sbom
        run: |
          cyclonedx-gomod mod -licenses -json -output axi-go-sbom.cdx.json
          echo "path=axi-go-sbom.cdx.json" >> "$GITHUB_OUTPUT"
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: axi-go-sbom.cdx.json
          if-no-files-found: error

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [verify, sbom]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Download SBOM
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          name: sbom
      - name: Install cosign
        uses: sigstore/cosign-installer@d7543c93d881b35a8faa02e8e3605f69b7a1ce62 # v3
      - name: Sign SBOM (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign-blob --yes \
            --output-signature axi-go-sbom.cdx.json.sig \
            --output-certificate axi-go-sbom.cdx.json.crt \
            axi-go-sbom.cdx.json
      - name: Extract CHANGELOG section for this tag
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Strip leading "v" so CHANGELOG can use either "[1.0.0]" or "[v1.0.0]".
          VER="${TAG#v}"
          {
            echo "body<<CHANGELOG_EOF"
            awk -v ver="$VER" '
              BEGIN { inside=0 }
              /^## \[/ {
                if (inside) exit
                if ($0 ~ "\\[" ver "\\]") { inside=1; next }
              }
              inside { print }
            ' CHANGELOG.md
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          # Pass CHANGELOG body via env, not ${{ }} interpolation into the
          # shell — otherwise quotes/backticks in the CHANGELOG would be
          # interpreted as shell syntax, which is both a bug and a
          # code-execution vector.
          BODY: ${{ steps.changelog.outputs.body }}
        run: |
          if [ -z "$BODY" ]; then
            BODY="Release ${GITHUB_REF_NAME}. See CHANGELOG.md for details."
          fi
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "$BODY" \
            axi-go-sbom.cdx.json \
            axi-go-sbom.cdx.json.sig \
            axi-go-sbom.cdx.json.crt

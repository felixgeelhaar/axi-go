name: Fuzz (nightly)

# Runs fuzz tests beyond the seed corpus to keep the harness productive.
# Seed inputs already execute on every PR via the regular test job; this
# workflow extends coverage with real fuzzing on a cron.

on:
  schedule:
    # 02:17 UTC daily — offset to avoid the global cron rush.
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz-toon:
    name: Fuzz toon.Encode
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
      - name: Fuzz for 5 minutes
        run: go test ./toon -run=^$ -fuzz=FuzzEncode -fuzztime=5m
      - name: Upload new failing inputs (if any)
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fuzz-failures
          path: toon/testdata/fuzz/FuzzEncode/
          if-no-files-found: ignore
